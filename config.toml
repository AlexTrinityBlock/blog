#上傳時記得啟動網址
baseURL = "https://alextrinityblock.github.io/blog/public/"
languageCode = "zh-hant"
title = "無面者小站"
theme = "ananke"

#分類選單單數與複數
pluralizelisttitles = false

DefaultContentLanguage = "zh-tw"
Paginate = 5 # 單頁最大文章數量
# googleAnalytics = ""
enableRobotsTXT = true

#上排選單設置
SectionPagesMenu = "main" #上排標籤選單

[[menu.main]]
    identifier = "linux"
    name = "linux"
    title = "linux"
    url = "/tags/linux"
    weight = 1
[[menu.main]]
    identifier = "hugo"
    name = "hugo"
    title = "hugo"
    url = "/tags/hugo"
    weight = 1
[[menu.main]]
    identifier = "vue"
    name = "vue"
    title = "vue"
    url = "/tags/vue/"
    weight = 1

[sitemap]
    changefreq = "monthly"
    priority = 2
    filename = "sitemap.xml"

[params]
  favicon = "/avatar2.jpg" #網站上頭的圖示
#  背景顏色
